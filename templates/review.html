<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文档评价</title>
</head>
<body>
<h2>评价文档</h2>
<form method="post">
{% for q in questions %}
  <label>{{ q.label }} (0~{{ q.max_score }})</label><br>
  <small>{{ q.description }}</small><br>
  <input type="number" name="{{ q.id }}" min="0" max="{{ q.max_score }}" required><br><br>
{% endfor %}
<label>评论</label><br>
<textarea name="comment"></textarea><br>
<button type="submit">提交评价</button>
</form>
<a href="{{ url_for('dashboard') }}">返回文档列表</a>
</body>
</html>
