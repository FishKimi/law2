<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h2 { color: #333; }
        input { padding: 8px; margin: 5px 0; width: 250px; }
        button { padding: 8px 16px; margin-top: 10px; }
        .link { margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <h2>注册新账号</h2>
    <form method="post">
        <label>用户名：</label><br>
        <input type="text" name="username" required><br>
        
        <label>密码：</label><br>
        <input type="password" name="password" required><br>
        
        <button type="submit">注册</button>
    </form>
    <span class="link">已有账号？<a href="{{ url_for('login') }}">登录</a></span>
</body>
</html>
